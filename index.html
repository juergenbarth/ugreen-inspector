<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGREEN Inspector</title>

    <!--
        All resources are loaded from the local directory.
        No external CDN requests are made at any point.
        This file can be opened directly in a browser (file:// protocol).

        Processing is entirely client-side:
          1. The .ugb file is parsed in-browser (Version header + service blocks)
          2. Gzip-compressed service blocks are decompressed using DecompressionStream API
          3. TAR archives are parsed in-browser (pure-JS parser)
          4. Security checks run in-browser against the parsed configuration
          5. No data is ever sent to any server

        Source code is intentionally unobfuscated for maximum transparency.
        Users are encouraged to review every file before use.

        Load order:
          1. i18n.js              — t() must be available to all modules
          2. tar-parser.js        — parseTar()
          3. ugb-pipeline.js      — parseUGBFile()
          4. compliance-engine.js — COMPLIANCE_CHECKS[], BEST_PRACTICES_CHECKS[], runAllChecks()
          5. checks/*.js          — push their functions into COMPLIANCE_CHECKS / BEST_PRACTICES_CHECKS
          6. compliance-view.js   — renderComplianceView()
          7. bestpractices-view.js — renderBestPracticesView()
          8. app.js               — bootstraps the UI (must be last)
    -->

    <link rel="stylesheet" href="css/vendor/sap-72-fonts.css">
    <link rel="stylesheet" href="css/vendor/sap-horizon-tokens.css">
    <link rel="stylesheet" href="css/vendor/fd-components.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/compliance.css">
</head>
<body>

    <!-- ── Shell Bar ─────────────────────────────────────────────────────── -->
    <header class="header">
        <div class="header-left">
            <img class="header-logo" src="img/logo-jklp.png" alt="JKLP Consulting">
            <div class="header-product">
                <span class="header-title">
                    UGREEN Inspector<span class="header-version">v1.0</span>
                </span>
                <span class="header-subtitle">JKLP CONSULTING · SECURITY AUDIT</span>
            </div>
        </div>
        <div class="header-right">
            <button class="about-btn" onclick="showAbout()">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="8" cy="8" r="7.25" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="7.25" y="6.5" width="1.5" height="5" rx=".75" fill="currentColor"/>
                    <rect x="7.25" y="4" width="1.5" height="1.5" rx=".75" fill="currentColor"/>
                </svg>
                About
            </button>
            <div class="lang-toggle">
                <button class="lang-btn lang-btn--active" data-lang="en"
                        onclick="setLanguage('en')">EN</button>
                <button class="lang-btn" data-lang="de"
                        onclick="setLanguage('de')">DE</button>
            </div>
        </div>
    </header>

    <!-- ── About modal ──────────────────────────────────────────────────────── -->
    <div id="about-modal" class="about-modal-overlay about-modal-overlay--hidden"
         onclick="if(event.target===this) closeAbout()">
        <div class="about-modal-panel" role="dialog" aria-modal="true">
            <button class="about-modal-close" onclick="closeAbout()" aria-label="Close">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <line x1="3" y1="3" x2="13" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="13" y1="3" x2="3" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
            <div id="about-modal-content"></div>
        </div>
    </div>

    <!-- ── Context Bar — file info (shown when a backup is loaded) ───────── -->
    <div id="context-bar" class="context-bar context-bar--hidden"></div>

    <!-- ── App root ──────────────────────────────────────────────────────── -->
    <div id="app"></div>

    <!-- ── i18n — must be first ──────────────────────────────────────────── -->
    <script src="js/i18n.js"></script>

    <!-- ── Parser modules ────────────────────────────────────────────────── -->
    <script src="js/tar-parser.js"></script>
    <script src="js/ugb-pipeline.js"></script>

    <!-- ── Compliance engine + self-registering check modules ────────────── -->
    <!-- compliance-engine.js must be first — it declares COMPLIANCE_CHECKS[] -->
    <script src="js/compliance-engine.js"></script>
    <script src="js/checks/check-remote-access.js"></script>
    <script src="js/checks/check-filesharing.js"></script>
    <script src="js/checks/check-network.js"></script>
    <script src="js/checks/check-users.js"></script>
    <script src="js/checks/check-maintenance.js"></script>
    <script src="js/checks/check-bestpractices.js"></script>
    <script src="js/compliance-view.js"></script>
    <script src="js/bestpractices-view.js"></script>

    <!-- ── app.js — must be last ─────────────────────────────────────────── -->
    <script src="js/app.js"></script>

</body>
</html>
